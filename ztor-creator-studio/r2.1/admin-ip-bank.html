<html lang="zh-Hant" data-theme="dark" data-page-feat="full"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin IP Bank · Ztor Creator Studio</title>

<link rel="stylesheet" href="ds-components/_tokens.css?v=20260723zi"><link rel="stylesheet" href="ds-components/fonts.css?v=20260723zi"><link rel="stylesheet" href="ds-components/button.css?v=20260723zi"><link rel="stylesheet" href="ds-components/badge.css?v=20260723zi"><link rel="stylesheet" href="ds-components/kpi.css?v=20260723zi"><link rel="stylesheet" href="ds-components/table.css?v=20260723zi"><link rel="stylesheet" href="ds-components/page-intro.css?v=20260723zi"><link rel="stylesheet" href="ds-components/empty-card.css?v=20260723zi"><link rel="stylesheet" href="ds-components/dropdown-menu.css?v=20260723zi"><link rel="stylesheet" href="ds-components/admin-ip-bank-table.css?v=20260723zi"><link rel="stylesheet" href="shared.css?v=20260723zi">
</head><body><div class="app"><header class="app-topbar" id="sidebar"></header><main class="main"><div class="page">
<nav class="text-sub" aria-label="麵包屑" style="font-size:var(--fs-12);margin-bottom:var(--space-shell-gutter)"><a class="card__link" href="creators.html" data-i18n="admin.studio">Admin Creator Studio</a><span aria-hidden="true"> / </span><span aria-current="page" data-i18n="admin.ip-bank">Admin IP Bank</span></nav>
<div class="page-intro"><div><h1 class="page-intro__title" data-i18n="admin.ip-bank">Admin IP Bank</h1><p class="page-intro__sub" data-i18n="ipbank.lede">Configure the IP owner and revenue share for every film across the platform.</p></div><div class="page-intro__actions"><a class="btn btn--primary" href="admin-ip-bank-entry.html"><i data-lucide="plus" class="ztor-icon ztor-icon--sm"></i><span data-i18n="ipbank.add">Add IP entry</span></a></div></div>
<div id="ip-bank-content"></div><p class="admin-note" data-i18n="ipbank.note">Shares are validated per film. Unallocated share remains with the platform.</p>
</div><footer class="app-footer"><span>Ztor Creator Studio · R 2.1 prototype</span><span>·</span><span data-i18n="admin.studio">Admin Creator Studio</span></footer></main></div>
<script src="js/icons.js?v=20260723zi"></script><script src="js/i18n.js?v=20260723zi"></script><script src="js/sidebar.js?v=20260723zi"></script><script src="js/ip-bank-store.js?v=20260723zi"></script><script src="js/devtools.js?v=20260723zi"></script>
<script>(function(){'use strict';var root=document.getElementById('ip-bank-content');function badge(s){return '<span class="badge '+(s==='linked'?'badge--success':'badge--warning')+'">'+(s==='linked'?'Linked':'Invited (Pending)')+'</span>';}function rowActions(r){if(r.status==='pending'){return '<details class="dropdown"><summary class="btn btn--ghost btn--icon btn--sm" aria-label="More actions"><i data-lucide="more-horizontal" class="ztor-icon"></i></summary><div class="dropdown__menu" role="menu"><button class="dropdown__item dropdown__item--danger" type="button" role="menuitem" data-remove="'+r.id+'"><i data-lucide="trash-2" class="ztor-icon"></i>Delete</button></div></details>';}return '<details class="dropdown"><summary class="btn btn--ghost btn--icon btn--sm" aria-label="More actions"><i data-lucide="more-horizontal" class="ztor-icon"></i></summary><div class="dropdown__menu" role="menu"><a class="dropdown__item" role="menuitem" href="admin-ip-bank-entry.html?id='+r.id+'"><i data-lucide="pencil" class="ztor-icon"></i>Edit</a></div></details>';}function render(){var rows=window.ztorIpBank.list();if(!rows.length){root.innerHTML='<div class="empty-card admin-empty"><div class="empty-card__icon"><i data-lucide="landmark" class="ztor-icon"></i></div><h2 class="empty-card__title">No IP entries yet</h2><p class="empty-card__text">Create the first Film × IP × Owner allocation.</p><a class="btn btn--primary" href="admin-ip-bank-entry.html">Add IP entry</a></div>';window.ztorIcons.render();return;}root.innerHTML='<div class="admin-table-wrap"><table class="ztor-table"><thead><tr><th>Film</th><th>IP title</th><th>Type</th><th>Owner</th><th>Status</th><th>Share</th><th></th></tr></thead><tbody>'+rows.map(function(r){var owner=window.ztorIpBank.ownerLabel(r);return '<tr><td><div class="admin-table__film"><span class="admin-table__thumb"></span><span>'+r.film+'</span></div></td><td class="ztor-table__feature">'+r.title+'</td><td>'+r.type+'</td><td><div class="admin-table__owner"><span class="admin-table__avatar">'+owner.slice(0,1)+'</span><span>'+owner+'</span></div></td><td>'+badge(r.status)+'</td><td class="admin-table__share">'+Number(r.share).toFixed(2)+'%</td><td><div class="admin-table__actions">'+rowActions(r)+'</div></td></tr>';}).join('')+'</tbody></table></div>';root.querySelectorAll('[data-remove]').forEach(function(b){b.addEventListener('click',function(){if(confirm('Remove this IP entry? This prototype action cannot be undone.')){window.ztorIpBank.remove(b.dataset.remove);render();}});});window.ztorIcons.render();}document.addEventListener('click',function(e){var item=e.target.closest('.dropdown__item');document.querySelectorAll('details.dropdown[open]').forEach(function(dropdown){if(item&&dropdown.contains(item)){dropdown.open=false;return;}if(!dropdown.contains(e.target))dropdown.open=false;});});render();}());</script>
</body></html>
