<!doctype html>
<html lang="zh-Hant" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Section 外框測試 · Ztor Creator Studio</title>
<script src="js/theme.js?v=20260721zy"></script>
<link rel="stylesheet" href="ds-components/_tokens.css?v=20260721zy">
<link rel="stylesheet" href="ds-components/fonts.css?v=20260721zy">
<link rel="stylesheet" href="ds-components/button.css?v=20260721zy">
<link rel="stylesheet" href="ds-components/input.css?v=20260721zy">
<link rel="stylesheet" href="ds-components/field-system.css?v=20260721zy">
<link rel="stylesheet" href="ds-components/form-section.css?v=20260721zy">
<link rel="stylesheet" href="shared.css?v=20260721zy">
</head>
<body>
  <div class="app">
    <main class="main">
      <div class="page">
      <header class="page-intro">
        <p class="page-intro__eyebrow">Design system test</p>
        <h1 class="page-intro__title">Section 外框測試</h1>
        <p class="page-intro__sub">這個頁面只驗證 opt-in 外框變體，不會套用到既有建立流程。</p>
        <p>
          <button class="btn btn--outline" type="button" data-theme-set="light">淺色</button>
          <button class="btn btn--outline" type="button" data-theme-set="dark">黑夜</button>
          <button class="btn btn--outline" type="button" data-theme-set="system">跟隨系統</button>
        </p>
      </header>

      <section class="form-section form-section--outlined">
        <div class="form-section__head">
          <h2 class="form-section__title">商品資訊</h2>
          <p class="form-section__sub">白天填色應是 --card（#FFF）；黑夜填色應是 --muted；外框共用 --border。</p>
        </div>
        <div class="field">
          <label class="field__label" for="section-test-name">商品名稱</label>
          <input class="input" id="section-test-name" value="夏日巡演帽 T">
        </div>
        <div class="field">
          <label class="field__label" for="section-test-note">說明</label>
          <textarea class="textarea" id="section-test-note" rows="3">此區段僅供測試，不影響正式表單。</textarea>
        </div>
      </section>
      </div>
    </main>
  </div>
</body>
</html>
