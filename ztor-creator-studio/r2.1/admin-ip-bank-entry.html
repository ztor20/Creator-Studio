<!doctype html>
<html lang="zh-Hant" data-theme="dark" data-page-feat="full">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>新增 IP Entry · Ztor Creator Studio</title>
<script src="js/theme.js?v=20260724b"></script>
<link rel="stylesheet" href="ds-components/_tokens.css?v=20260724b"><link rel="stylesheet" href="ds-components/fonts.css?v=20260724b"><link rel="stylesheet" href="ds-components/button.css?v=20260724b"><link rel="stylesheet" href="ds-components/input.css?v=20260724b"><link rel="stylesheet" href="ds-components/field-system.css?v=20260724b"><link rel="stylesheet" href="ds-components/form-grid.css?v=20260724b"><link rel="stylesheet" href="ds-components/form-section.css?v=20260724b"><link rel="stylesheet" href="ds-components/kpi.css?v=20260724b"><link rel="stylesheet" href="ds-components/owner-lookup.css?v=20260724b"><link rel="stylesheet" href="ds-components/leave-dialog.css?v=20260724b"><link rel="stylesheet" href="shared.css?v=20260724b">
<style>.wizard__body--narrow { max-width: 800px; }</style>
</head>
<body><div class="wizard" data-autosave="false"><div class="wizard__sheet wizard__sheet--sectioned">
<header class="wizard__top"><div class="wizard__top-bar"><div class="wizard__top-lead"><button class="wizard__back" type="button" data-wizard-back aria-label="返回"><i data-lucide="chevron-left" class="ztor-icon"></i></button><div class="wizard__top-titlewrap"><span class="wizard__top-title" id="entry-title">新增 IP Entry</span><span class="wizard__top-sub">Admin Creator Studio · IP Bank</span></div></div><div class="wizard__top-actions"><span class="wizard__save-status wizard__save-status--button" data-wizard-save data-state="saved"><span class="wizard__save-status__dot"></span><span data-wizard-save-text>儲存</span></span></div></div></header>
<form id="entry-form" class="wizard__body wizard__body--form wizard__body--narrow">
  <section class="form-section form-section--outlined"><div class="form-section__head"><h1 class="wizard__step-title">IP 資料</h1></div><div class="form-grid"><label class="field"><span class="field__label">影片（Film）*</span><select class="select" id="film" required></select></label><label class="field"><span class="field__label">IP 類型 *</span><select class="select" id="type" required></select></label></div><label class="field"><span class="field__label">IP 名稱 *</span><input class="input" id="title" required></label></section>
  <section class="form-section form-section--outlined"><div class="form-section__head"><h2 class="form-section__title">Owner 連結</h2><p class="form-section__sub">搜尋既有 Ztor 使用者的 username 或 email；未註冊的有效 email 會在儲存後建立待寄送邀請。</p></div><div class="field"><span class="field__label">權利人（Owner）*</span><div id="owner-lookup"></div><span class="field__hint">選擇既有帳號會直接連結；同一待邀請 email 不可重複建立。</span></div></section>
  <section class="form-section form-section--outlined"><div class="form-section__head"><h2 class="form-section__title">分潤配置</h2></div><div class="form-grid"><div class="kpi kpi--compact"><div class="kpi__label">已配置比例</div><div class="kpi__value" id="allocated">0.00%</div></div><div class="kpi kpi--compact"><div class="kpi__label">剩餘比例</div><div class="kpi__value" id="remaining">100.00%</div></div></div><label class="field"><span class="field__label">分潤比例（%）*</span><input class="input" id="share" type="number" min="0" max="100" step="0.01" required></label><p class="text-sub" id="entry-error" hidden></p></section>
</form></div><footer class="wizard__bottom" style="justify-content:flex-end"><div class="wizard__bottom-actions"><button class="btn btn--primary" type="submit" form="entry-form">儲存 IP Entry</button></div></footer></div>
<script src="js/icons.js?v=20260724b"></script><script src="js/i18n.js?v=20260724b"></script><script src="js/ip-bank-store.js?v=20260724b"></script><script src="partials/owner-lookup.js?v=20260724b"></script><script src="partials/wizard-chrome.js?v=20260724b"></script><script src="js/devtools.js?v=20260724b"></script>
<script>(function(){'use strict';var S=window.ztorIpBank,q=new URLSearchParams(location.search),id=q.get('id'),old=S.list().find(function(r){return r.id===id;}),film=document.getElementById('film'),title=document.getElementById('title'),type=document.getElementById('type'),share=document.getElementById('share'),allocated=document.getElementById('allocated'),remaining=document.getElementById('remaining'),error=document.getElementById('entry-error'),lookup;function tx(key,fallback){return window.i18nT?(window.i18nT(key)||fallback):fallback;}document.getElementById('entry-title').textContent=old?'編輯 IP Entry':'新增 IP Entry';S.films().forEach(function(f){film.add(new Option(f,f));});S.types.forEach(function(t){type.add(new Option(t,t));});if(old){film.value=old.film;title.value=old.title;type.value=old.type;share.value=old.share;}lookup=window.OwnerLookup.mount({host:document.getElementById('owner-lookup'),directory:S.ownerDirectory(),initialValue:old&&old.owner,isInviteDuplicate:function(email){return S.isPendingInviteDuplicate(email,id);}});function syncShare(){var a=S.allocated(film.value,id),n=Number(share.value||0),total=a+n;allocated.textContent=total.toFixed(2)+'%';remaining.textContent=Math.max(0,100-total).toFixed(2)+'%';error.hidden=total<=100;error.textContent=total>100?'此 Film 的分潤比例合計不可超過 100%。':'';}[film,share].forEach(function(el){el.addEventListener('input',syncShare);el.addEventListener('change',syncShare);});syncShare();document.getElementById('entry-form').addEventListener('submit',function(e){e.preventDefault();var a=S.allocated(film.value,id),n=Number(share.value),owner=lookup.getValue(),invalidOwner=owner.kind==='empty'||(owner.kind==='invite'&&S.isPendingInviteDuplicate(owner.email,id));if(!this.checkValidity()||n<0||n>100||a+n>100||invalidOwner){this.reportValidity();error.textContent=a+n>100?'此 Film 的分潤比例合計不可超過 100%。':owner.kind==='empty'?tx('ipentry.owner.required','Select a registered owner or a valid email invitation.'):tx('ipentry.owner.submit-error','Resolve the Owner invitation before saving.');error.hidden=false;if(owner.kind==='empty')lookup.focus();return;}var ownerValue=owner.kind==='linked'?{kind:'linked',userId:owner.user.id,displayName:owner.user.displayName,username:owner.user.username,email:owner.user.email}:{kind:'invite',email:owner.email};try{S.save({id:id||'ip-'+Date.now(),film:film.value,title:title.value.trim(),type:type.value,owner:ownerValue,status:ownerValue.kind==='linked'?'linked':'pending',invitation:ownerValue.kind==='invite'?S.createInvitation(ownerValue.email):null,share:n,withdrawn:old?old.withdrawn:0});location.href='admin-ip-bank.html';}catch(saveError){error.textContent=tx('ipentry.owner.submit-error','Resolve the Owner invitation before saving.');error.hidden=false;}});}());</script>
</body></html>
